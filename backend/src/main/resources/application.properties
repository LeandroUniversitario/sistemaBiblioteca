# Configuracion del puerto del servidor
server.port=8080

# Configuracion de conexion a la base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/sistemabiblioteca?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuracion del pool de conexiones (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# Habilitar logs para SQL (opcional, util para debugging)
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG
logging.level.org.springframework.jdbc.core.simple.SimpleJdbcCall=DEBUG
