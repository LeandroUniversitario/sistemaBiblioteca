<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Biblioteca Universitaria</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-bg d-flex justify-content-center align-items-center vh-100">

    <div class="login-card p-5 shadow-lg glass-panel">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-white mb-2">Biblioteca</h2>
            <p class="text-light-50">Ingreso al Sistema Universitario</p>
        </div>
        
        <form id="loginForm" class="mt-4">
            <div class="mb-4 form-floating custom-input">
                <input type="text" class="form-control" id="username" placeholder="Usuario" required>
                <label for="username">Usuario</label>
            </div>
            
            <div class="mb-4 form-floating custom-input">
                <input type="password" class="form-control" id="password" placeholder="Contraseña" required>
                <label for="password">Contraseña</label>
            </div>
            
            <div id="loginAlert" class="alert alert-danger d-none mt-3 text-center" role="alert" style="border-radius: 12px; font-size: 0.9rem;"></div>
            
            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-primary btn-lg custom-btn fw-bold" id="btnLogin">
                    <span id="btnText">Iniciar Sesión</span>
                    <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                </button>
            </div>
            
            <div class="text-center mt-4">
                <a href="#" class="text-light text-decoration-none small hover-glow">¿Olvidaste tu contraseña?</a>
            </div>
        </form>
    </div>

<!-- Bootstrap JS CDN -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/login.js"></script>
</body>
</html>
