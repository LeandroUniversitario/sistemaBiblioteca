<!DOCTYPE html>
<html lang="es">
<head>
<script>
const originalFetch = window.fetch;
window.fetch = async function() {
    let [resource, config] = arguments;
    if(typeof resource === 'string' && resource.includes('loca.lt')) {
        config = config || {};
        config.headers = config.headers || {};
        config.headers['Bypass-Tunnel-Reminder'] = 'true';
    }
    return originalFetch(resource, config);
};
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Biblioteca Universitaria</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-bg d-flex justify-content-center align-items-center vh-100">

    <div class="login-card p-5 shadow-lg glass-panel">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-white mb-2">Biblioteca</h2>
            <p class="text-light-50">Ingreso al Sistema Universitario</p>
        </div>
        
        <form id="loginForm" class="mt-4">
            <div class="mb-4 form-floating custom-input">
                <input type="email" class="form-control" id="username" name="email" autocomplete="email" placeholder="Usuario" required>
                <label for="username">Usuario</label>
            </div>
            
            <div class="mb-4 form-floating custom-input">
                <input type="password" class="form-control" id="password" name="password" autocomplete="current-password" placeholder="Contraseña" required>
                <label for="password">Contraseña</label>
            </div>
            
            <div id="loginAlert" class="alert alert-danger d-none mt-3 text-center" role="alert" style="border-radius: 12px; font-size: 0.9rem;"></div>
            
            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-primary btn-lg custom-btn fw-bold" id="btnLogin">
                    <span id="btnText">Iniciar Sesión</span>
                    <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                </button>
            </div>
            
            <div class="text-center mt-4">
                <a href="#" class="text-light text-decoration-none small hover-glow" data-bs-toggle="modal" data-bs-target="#forgotPasswordModal">¿Olvidaste tu contraseña?</a>
            </div>
        </form>
    </div>

    <!-- Modal Recuperar Contraseña -->
    <div class="modal fade" id="forgotPasswordModal" tabindex="-1" aria-labelledby="forgotPasswordModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="forgotPasswordModalLabel">Restablecer Contraseña</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted small mb-4">Ingresa tu correo y documento de identidad para validar tu identidad. Luego ingresa tu nueva contraseña.</p>
                    
                    <form id="forgotPasswordForm">
                        <div class="mb-3">
                            <label for="resetEmail" class="form-label text-dark fw-bold">Correo Electrónico</label>
                            <input type="email" class="form-control" id="resetEmail" name="email" autocomplete="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="resetDocumento" class="form-label text-dark fw-bold">Documento de Identidad</label>
                            <input type="text" class="form-control" id="resetDocumento" name="documento" autocomplete="off" required>
                        </div>
                        <div class="mb-3">
                            <label for="resetNuevaPassword" class="form-label text-dark fw-bold">Nueva Contraseña</label>
                            <input type="password" class="form-control" id="resetNuevaPassword" name="new-password" autocomplete="new-password" required>
                        </div>
                        <div class="mb-3">
                            <label for="resetConfirmarPassword" class="form-label text-dark fw-bold">Confirmar Nueva Contraseña</label>
                            <input type="password" class="form-control" id="resetConfirmarPassword" name="confirm-password" autocomplete="new-password" required>
                        </div>
                        <div id="resetAlert" class="alert d-none mt-3" role="alert"></div>
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary fw-bold" id="btnReset">
                                <span id="btnResetText">Restablecer Contraseña</span>
                                <span id="btnResetSpinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

<!-- Bootstrap JS CDN -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js?v=2"></script>
<script src="js/login.js?v=2"></script>
</body>
</html>
